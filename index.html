<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>건강검진기관 지도</title>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1f492781cac182a0af8728e7d8df08c0&libraries=clusterer,services&autoload=false"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">건강검진기관 지도</h1>
      <span class="header-subtitle">전국 검진기관 위치 안내</span>
    </div>
  </header>

  <div class="main">
    <!-- 필터 패널 -->
    <aside class="filter-panel">
      <div class="filter-section">
        <h2 class="filter-heading">지역 필터</h2>
        <label class="filter-label" for="region1-select">시 / 도</label>
        <select id="region1-select" class="filter-select">
          <option value="">전체 지역</option>
        </select>
        <label class="filter-label" for="region2-select">시 / 군 / 구</label>
        <select id="region2-select" class="filter-select" disabled>
          <option value="">전체 구역</option>
        </select>
        <button id="reset-btn" class="reset-btn">전체 초기화</button>
      </div>

      <div class="filter-section">
        <h2 class="filter-heading">지도 클릭 안내</h2>
        <p class="filter-help">지도의 빈 공간을 클릭하면 해당 지역의 검진기관 목록이 표시됩니다.</p>
        <div id="click-status" class="click-status"></div>
      </div>

      <div class="filter-section stats-section">
        <div id="stats" class="stats"></div>
      </div>
    </aside>

    <!-- 지도 -->
    <div id="map"></div>

    <!-- 기관 목록 패널 -->
    <aside class="list-panel">
      <!-- 검색 -->
      <div class="search-bar">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 기관명 검색...">
        <button id="search-clear" class="search-clear hidden">✕</button>
      </div>

      <!-- 목록 헤더 -->
      <div class="list-header">
        <span id="list-count" class="list-count">전체 기관</span>
        <span id="list-total" class="list-total"></span>
        <button id="add-btn" class="add-btn" title="새 기관 추가">＋ 기관 추가</button>
      </div>

      <div id="facility-list" class="facility-list">
        <div class="list-loading">데이터를 불러오는 중...</div>
      </div>
    </aside>
  </div>

  <!-- 추가/수정 모달 -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">검진기관 추가</h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">기관명 <span class="required">*</span></label>
        <input type="text" id="modal-name" class="modal-input" placeholder="예) 강남세브란스병원">

        <label class="modal-label">주소 <span class="required">*</span></label>
        <div class="addr-row">
          <input type="text" id="modal-address" class="modal-input" placeholder="예) 서울특별시 강남구 언주로 211">
          <button id="modal-geocode" class="geocode-btn">위치 검색</button>
        </div>
        <div id="geocode-status" class="geocode-status"></div>

        <div class="region-row">
          <div>
            <label class="modal-label">시 / 도</label>
            <input type="text" id="modal-region1" class="modal-input" placeholder="서울특별시" readonly>
          </div>
          <div>
            <label class="modal-label">구 / 군 / 시</label>
            <input type="text" id="modal-region2" class="modal-input" placeholder="강남구" readonly>
          </div>
        </div>
        <p class="modal-hint">* 주소 입력 후 '위치 검색' 버튼을 눌러 자동 설정</p>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="modal-btn cancel">취소</button>
        <button id="modal-save" class="modal-btn save">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
