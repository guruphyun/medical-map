<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객사 · 검진기관 반경 검색</title>
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1f492781cac182a0af8728e7d8df08c0&libraries=services&autoload=false"></script>
  <link rel="stylesheet" href="nearby.css"/>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">고객사 · 검진기관 반경 검색</h1>
      <div class="header-nav" style="display:flex;gap:8px;">
        <a href="index.html" class="nav-link">🗺️ 검진기관 지도</a>
        <a href="list.html"  class="nav-link">📋 목록 관리</a>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- 왼쪽 패널: 검색 조건 -->
    <aside class="left-panel">
      <!-- 모드 토글 -->
      <div class="section">
        <h2 class="section-heading">검색 기준 선택</h2>
        <div class="mode-toggle">
          <button id="btn-mode-client"   class="mode-btn active">🏢 고객사 기준</button>
          <button id="btn-mode-facility" class="mode-btn">🏥 검진기관 기준</button>
        </div>
        <p class="hint" id="mode-hint">고객사를 선택하면 반경 내 검진기관이 표시됩니다.</p>
      </div>

      <!-- 검색창 -->
      <div class="section">
        <h2 class="section-heading">기준 검색</h2>
        <div class="search-box" id="search-box">
          <input type="text" id="search-input" class="search-input" placeholder="고객사 검색...">
          <button class="search-clear-btn hidden" id="search-clear">✕</button>
          <div id="search-dropdown" class="search-dropdown hidden"></div>
        </div>
      </div>

      <!-- 선택된 기준 -->
      <div class="section">
        <h2 class="section-heading">선택된 기준</h2>
        <div id="base-info" class="base-info">
          <span class="base-hint">지도에서 클릭하거나<br>위에서 검색하세요</span>
        </div>
      </div>

      <!-- 반경 설정 -->
      <div class="section">
        <h2 class="section-heading">검색 반경</h2>
        <div class="radius-row">
          <input type="range" id="radius-slider" min="1" max="50" value="10" class="radius-slider">
          <div class="radius-value-row">
            <input type="number" id="radius-input" value="10" min="1" max="200" class="radius-num-input">
            <span class="radius-unit">km</span>
          </div>
        </div>
      </div>

      <!-- 고객사 관리 버튼 -->
      <div class="section">
        <button id="add-client-btn"    class="action-btn green">＋ 고객사 추가</button>
        <button id="client-manage-btn" class="action-btn gray">📋 고객사 관리</button>
      </div>

      <!-- 통계 -->
      <div class="section stats-section">
        <div id="stats" class="stats"></div>
      </div>
    </aside>

    <!-- 지도 -->
    <div class="map-wrap">
      <div id="map"></div>
      <div id="map-legend" class="map-legend">
        <span class="ml-item"><span class="ml-pin client"></span>고객사</span>
        <span class="ml-item"><span class="ml-dot facility"></span>검진기관</span>
      </div>
    </div>

    <!-- 오른쪽 결과 패널 -->
    <aside class="right-panel">
      <div class="result-header">
        <span id="result-count" class="result-count">기준을 선택하세요</span>
        <button id="result-export-btn" class="export-btn hidden">📋 복사</button>
      </div>
      <div id="result-list" class="result-list">
        <div class="no-result-init">
          <p>🔍 고객사 또는 검진기관을<br>선택하면 반경 내 목록이<br>표시됩니다.</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- 고객사 추가/수정 모달 -->
  <div id="client-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="client-modal-title">고객사 추가</h3>
        <button id="client-modal-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">고객사명 <span class="required">*</span></label>
        <input type="text" id="cm-name" class="modal-input" placeholder="예) 삼성전자">

        <label class="modal-label">주소 <span class="required">*</span></label>
        <div class="addr-row">
          <input type="text" id="cm-address" class="modal-input" placeholder="예) 서울특별시 강남구 삼성로 85">
          <button id="cm-geocode-btn" class="geocode-btn">위치 검색</button>
        </div>
        <div id="cm-geocode-status" class="geocode-status"></div>

        <label class="modal-label">상세주소</label>
        <input type="text" id="cm-detail" class="modal-input" placeholder="층, 호수 등">

        <div class="region-row">
          <div>
            <label class="modal-label">시 / 도</label>
            <input type="text" id="cm-region1" class="modal-input" placeholder="서울특별시">
          </div>
          <div>
            <label class="modal-label">구 / 군 / 시</label>
            <input type="text" id="cm-region2" class="modal-input" placeholder="강남구">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="client-modal-cancel" class="modal-btn cancel">취소</button>
        <button id="client-modal-save"   class="modal-btn save">저장</button>
      </div>
    </div>
  </div>

  <!-- 고객사 관리 모달 -->
  <div id="client-manage-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>고객사 관리</h3>
        <button id="cm-manage-close" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="cm-filter-row">
          <input type="text" id="cm-filter-input" class="modal-input" placeholder="🔍 고객사명 검색...">
          <button onclick="openClientModal(null)" class="geocode-btn">＋ 추가</button>
        </div>
        <div id="cm-manage-list" class="cm-manage-list"></div>
      </div>
      <div class="modal-footer">
        <button id="cm-manage-done" class="modal-btn save">완료</button>
      </div>
    </div>
  </div>

  <script src="nearby.js"></script>
</body>
</html>
